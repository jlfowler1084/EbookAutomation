server {
    listen 80;
    server_name leafbind.io www.leafbind.io api.leafbind.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leafbind.io www.leafbind.io api.leafbind.io;

    ssl_certificate     /etc/letsencrypt/live/leafbind.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leafbind.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Origin lockdown (EB-324 Unit 8) ──────────────────────────────────
    # Only Cloudflare edge IPs may reach this origin. This is the deploy-side
    # half of the trusted-proxy rate-limit defense: the app trusts the
    # CF-Connecting-IP header ONLY from the local proxy (web_service/rate_limit.py),
    # and this allowlist ensures only Cloudflare can reach that proxy. Without
    # it, an attacker who discovers the Hetzner VM IP could hit the origin
    # directly and forge CF-Connecting-IP to bypass per-IP rate limiting.
    #
    # The ranges below are Cloudflare's published lists (cloudflare.com/ips-v4,
    # /ips-v6). Refresh monthly via deploy/refresh-cloudflare-ips.sh, which
    # rewrites everything between the sentinel comments and reloads nginx.
    # localhost is allowed for local healthchecks.
    allow 127.0.0.1;
    allow ::1;
    # BEGIN CLOUDFLARE IPS (managed by deploy/refresh-cloudflare-ips.sh — do not edit by hand)
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # END CLOUDFLARE IPS
    deny all;

    client_max_body_size 110M;

    location = /stripe/webhook {
        proxy_pass http://127.0.0.1:8001;
        client_max_body_size 256k;  # CVE-2026-40481 mitigation + headroom for future event subscriptions
        # Optional: rate-limit at the Cloudflare layer (see deploy/README.md);
        # this is defense-in-depth only — Stripe signature validation is primary.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;  # Stripe webhook delivery is fast; long timeout would mask app-layer bugs
    }

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 620s;
        proxy_send_timeout 620s;
    }
}
