# EB-291: Web-service test gate.
#
# Runs the pytest suite for the FastAPI billing surface (web_service/) on every
# PR targeting master. The most important member of this suite is
# tests/test_web_payment_e2e.py (EB-273), which asserts the literal success_url
# in checkout.py resolves to a real route — catches the audit-flagged failure
# mode "customer pays, lands on 404" before it reaches production.
#
# Scope is intentionally limited to test_web_*.py:
#   - The pipeline suite (tools/test_pipeline.py) needs Calibre + KFX fixtures
#     that aren't reasonable to bootstrap in CI.
#   - The web tests are pure Python + mocked I/O; they run in ~10 seconds.
#
# This workflow does NOT exercise real Stripe — for that, run
# tools/verify_stripe_e2e.ps1 locally before a production deploy.
name: web-tests

on:
  pull_request:
    branches: [master]
    paths:
      - "web_service/**"
      - "tests/test_web_*.py"
      - "tests/conftest.py"
      - "requirements.txt"
      - "dev-requirements.txt"
      - ".github/workflows/web-tests.yml"
  push:
    branches: [master]
    paths:
      - "web_service/**"
      - "tests/test_web_*.py"
      - "tests/conftest.py"

# Allow concurrent PRs but cancel older runs from the same PR.
concurrency:
  group: web-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest tests/test_web_*.py
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # dev-requirements.txt pulls in requirements.txt via `-r`.
          python -m pip install -r dev-requirements.txt

      - name: Run web-service pytest suite
        # Discovery glob matches tests/test_web_*.py. -q keeps output compact;
        # any failure surfaces the full traceback on its own.
        run: |
          python -m pytest tests/test_web_*.py -q --tb=short
