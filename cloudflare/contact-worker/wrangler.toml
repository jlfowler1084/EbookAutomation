name = "contact-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# EB-264: Worker is bound to forms.leafbind.io/contact.
# api.leafbind.io is reserved for the FastAPI conversion backend on Hetzner VM.
# DO NOT change the route to api.leafbind.io.
[[routes]]
pattern = "forms.leafbind.io/contact"
zone_name = "leafbind.io"

[[kv_namespaces]]
binding = "CONTACT_KV"
# Public Cloudflare resource ID (not a secret). wrangler emits this when the
# namespace is created and the documented pattern is to commit it to source.
id = "618da863fc134b249bb88f365adec450"

# Secrets — set via: wrangler secret put <NAME>
# TURNSTILE_SECRET_KEY: from Cloudflare Dashboard → Turnstile → leafbind.io site
# RESEND_API_KEY:        from Resend dashboard (re_...)
# SUPPORT_INBOX_ADDRESS: support@leafbind.io
# These are referenced in src/types.ts Env interface and NOT committed to the repo.
